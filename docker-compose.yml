# SkillForge Docker Compose
# Complete local development environment

version: '3.8'

services:
  # SkillForge API Server
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://skillforge:skillforge@db:5432/skillforge
      - REDIS_URL=redis://redis:6379
      - SKILL_TOKEN_ADDRESS=${SKILL_TOKEN_ADDRESS}
      - SKILL_REGISTRY_ADDRESS=${SKILL_REGISTRY_ADDRESS}
    depends_on:
      - db
      - redis
    volumes:
      - ./skills:/app/skills:ro
    networks:
      - skillforge-network

  # Evolution Engine Worker
  evolution-worker:
    build:
      context: ./packages/core
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://skillforge:skillforge@db:5432/skillforge
      - REDIS_URL=redis://redis:6379
      - WORKER_TYPE=evolution
    depends_on:
      - db
      - redis
    volumes:
      - ./skills:/app/skills
    networks:
      - skillforge-network
    deploy:
      replicas: 3

  # Validation Worker
  validation-worker:
    build:
      context: ./packages/validator
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://skillforge:skillforge@db:5432/skillforge
      - REDIS_URL=redis://redis:6379
      - WORKER_TYPE=validation
      - VALIDATOR_STAKE=5000
      - VALIDATOR_ADDRESS=${VALIDATOR_ADDRESS}
    depends_on:
      - db
      - redis
    networks:
      - skillforge-network
    deploy:
      replicas: 2

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=skillforge
      - POSTGRES_PASSWORD=skillforge
      - POSTGRES_DB=skillforge
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - skillforge-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - skillforge-network

  # IPFS Node (for decentralized skill storage)
  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs-data:/data/ipfs
    networks:
      - skillforge-network

  # Blockchain Node (for local testing)
  blockchain:
    build:
      context: ./packages/contracts
      dockerfile: Dockerfile.anvil
    ports:
      - "8545:8545"
    networks:
      - skillforge-network

  # SkillForge Dashboard
  dashboard:
    build:
      context: ./packages/dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3000
    depends_on:
      - api
    networks:
      - skillforge-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - dashboard
    networks:
      - skillforge-network

volumes:
  postgres-data:
  redis-data:
  ipfs-data:

networks:
  skillforge-network:
    driver: bridge

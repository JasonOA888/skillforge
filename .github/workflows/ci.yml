name: SkillForge CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build SDK
        run: npm run build --workspace=@skillforge/sdk
      
      - name: Test SDK
        run: npm test --workspace=@skillforge/sdk
      
      - name: Lint SDK
        run: npm run lint --workspace=@skillforge/sdk

  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd packages/core
          pip install -e .[dev]
      
      - name: Run tests
        run: |
          cd packages/core
          pytest tests/ -v --cov=src/skillforge --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./packages/core/coverage.xml

  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      
      - name: Build contracts
        run: |
          cd packages/contracts
          forge build
      
      - name: Test contracts
        run: |
          cd packages/contracts
          forge test -vvv

  lint-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate skill format
        run: |
          python3 << 'EOF'
          import json
          import os
          import sys
          from pathlib import Path
          
          errors = []
          
          for skill_dir in Path('skills').iterdir():
              if not skill_dir.is_dir():
                  continue
              
              # Check required files
              skill_md = skill_dir / 'SKILL.md'
              gene_json = skill_dir / 'gene.json'
              
              if not skill_md.exists():
                  errors.append(f"{skill_dir.name}: Missing SKILL.md")
              
              if gene_json.exists():
                  try:
                      with open(gene_json) as f:
                          gene = json.load(f)
                      
                      # Validate structure
                      required = ['id', 'name', 'gene', 'metadata']
                      for field in required:
                          if field not in gene:
                              errors.append(f"{skill_dir.name}: Missing field '{field}' in gene.json")
                      
                      # Validate metadata
                      if 'metadata' in gene:
                          meta = gene['metadata']
                          if 'success_rate' not in meta:
                              errors.append(f"{skill_dir.name}: Missing 'success_rate' in metadata")
                  except json.JSONDecodeError as e:
                      errors.append(f"{skill_dir.name}: Invalid JSON - {e}")
          
          if errors:
              for err in errors:
                  print(f"❌ {err}")
              sys.exit(1)
          else:
              print("✅ All skills validated successfully")
          EOF

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-sdk, test-core]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push SDK image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/sdk
          push: true
          tags: skillforge/sdk:latest,skillforge/sdk:${{ github.sha }}
      
      - name: Build and push Validator image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/validator
          push: true
          tags: skillforge/validator:latest,skillforge/validator:${{ github.sha }}

  deploy-testnet:
    runs-on: ubuntu-latest
    needs: [test-contracts]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Deploy to Sepolia testnet
        run: |
          cd packages/contracts
          npx hardhat run scripts/deploy.ts --network sepolia
        env:
          INFURA_API_KEY: ${{ secrets.INFURA_API_KEY }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}

  release:
    runs-on: ubuntu-latest
    needs: [test-sdk, test-core, test-contracts, lint-skills]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Publish SDK to npm
        run: |
          npm ci
          npm run build --workspace=@skillforge/sdk
          npm publish --workspace=@skillforge/sdk --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Publish Core to PyPI
        run: |
          cd packages/core
          python -m pip install --upgrade build twine
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            packages/sdk/dist/*.tgz
            packages/core/dist/*.whl

  notify:
    runs-on: ubuntu-latest
    needs: [test-sdk, test-core, test-contracts]
    if: always()
    steps:
      - name: Notify Discord
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "embeds": [{
                "title": "SkillForge CI/CD ${{ job.status }}",
                "description": "Branch: ${{ github.ref }}\nCommit: ${{ github.sha }}",
                "color": ${{ job.status == 'success' && '3066993' || '15158332' }},
                "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }'
